name: Refresh results & deploy

on:
  schedule:
    # Hourly — pulls latest finished-match results from Naver and redeploys.
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Refresh results from Naver
        run: node scripts/update-results.mjs

      - name: Commit refreshed snapshot
        run: |
          if ! git diff --quiet -- src/lib/snapshot.ts; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/lib/snapshot.ts
            git commit -m "chore: refresh results snapshot [skip ci]"
            git push
          else
            echo "No result changes."
          fi

      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
